<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: 'Inter', sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rank-card {
      width: 500px;
      height: 240px;
      background: url('{unionjack}') no-repeat center center;
      background-size: cover;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* Dark overlay to make text readable over the flag */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.4) 60%, rgba(0, 0, 0, 0.7) 100%);
      z-index: 1;
    }

    .left-panel {
      flex: 0 0 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    .avatar-container {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #00247D 25%, #FFFFFF 40%, #CF142B 60%, #FFFFFF 75%, #00247D);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }

    .avatar {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      object-fit: cover;
    }

    .main-panel {
      flex: 1;
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 10;
    }

    .username {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      margin-bottom: -2px;
    }

    .rank-label {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: #FFD700;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 4px;
    }

    .progress-track {
      height: 10px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 5px;
    }

    .xp-summary {
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .xp-value {
      font-size: 1.1rem;
      color: #3b82f6;
      font-weight: 700;
    }

    .balance-chips {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .coin-box {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 0.7rem;
      font-weight: 700;
      gap: 6px;
    }

    .coin-icon {
      width: 16px;
      height: 16px;
    }
  </style>
</head>

<body>
  <div class="rank-card">
    <div class="overlay"></div>
    <div class="left-panel">
      <div class="avatar-container">
        <img src="{profile_pic}" alt="Avatar" class="avatar" />
      </div>
      <div class="balance-chips">
        {shutcoin_html}
        {britbuck_html}
      </div>
    </div>
    <div class="main-panel">
      <div class="user-header">
        <div class="rank-label">Rank #{rank}</div>
        <div class="username">{username}</div>
      </div>

      <div class="progress-section">
        <div class="progress-meta">
          <span>{current_role}</span>
          <span>{next_role_name}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width: {progress_percent};"></div>
        </div>
        <div class="xp-summary">
          <span class="xp-value">{xp_display}</span>
          <span style="color:#94a3b8; font-size: 10px; text-transform: uppercase;">Total XP</span>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
