<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* HMS Victory - roulette spin ticker. A horizontal strip of pockets (in real wheel
     order) scrolls LEFT under a fixed centre pointer and eases to a stop on the winning
     pocket. Motion is driven by the `.track` element's `left:` (a layout reflow) so the
     fast frame-sequence renderer captures each frame correctly - a CSS transform would
     screenshot stale (same reason the slots reels use `top:`). The screenshot clips to
     the .viewport element. Numbers only, so no web fonts to load. */
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#06122b;}
  .viewport{position:relative;width:910px;height:300px;overflow:hidden;
    background:linear-gradient(180deg,#0c2a52 0%, #061d3e 100%);
    font-family:Georgia,"Times New Roman",serif;}

  .brandbar{position:absolute;top:0;left:0;right:0;height:46px;z-index:6;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,rgba(0,0,0,.6),rgba(0,0,0,.12));
    border-bottom:1px solid rgba(214,164,74,.55);}
  .brandbar .nm{font-weight:800;letter-spacing:.24em;font-size:14px;text-transform:uppercase;color:#e8cf92;}

  .pointer{position:absolute;top:50px;left:50%;margin-left:-15px;z-index:7;width:0;height:0;
    border-left:15px solid transparent;border-right:15px solid transparent;border-top:21px solid #ffd95e;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.7));}
  .centerline{position:absolute;top:72px;height:200px;left:50%;width:0;z-index:5;
    box-shadow:0 0 0 1px rgba(255,217,94,.55), 0 0 16px rgba(255,217,94,.4);}

  .track{position:absolute;top:72px;left:0;display:flex;height:200px;}
  .pocket{width:130px;height:200px;flex:none;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:70px;color:#fff;border-right:2px solid rgba(0,0,0,.55);
    text-shadow:0 2px 4px rgba(0,0,0,.55);}
  .pocket.red{background:linear-gradient(180deg,#c62a35,#9c1f29);}
  .pocket.black{background:linear-gradient(180deg,#262a30,#121316);}
  .pocket.green{background:linear-gradient(180deg,#1d9a52,#10683a);}
  .pocket.win{box-shadow:inset 0 0 0 5px #ffd95e, inset 0 0 36px rgba(255,217,94,.45);}

  .fade-l,.fade-r{position:absolute;top:72px;height:200px;width:190px;z-index:4;pointer-events:none;}
  .fade-l{left:0;background:linear-gradient(90deg,#08214a 0%, rgba(8,33,74,0) 100%);}
  .fade-r{right:0;background:linear-gradient(270deg,#08214a 0%, rgba(8,33,74,0) 100%);}
  .tray{position:absolute;left:0;right:0;bottom:0;height:28px;z-index:6;
    background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.55));
    border-top:1px solid rgba(214,164,74,.4);}
</style>
</head>
<body>
  <div class="viewport">
    <div class="brandbar"><span class="nm">HMS Victory · European Roulette</span></div>
    <div class="pointer"></div>
    <div class="centerline"></div>
    <div class="track" style="left:{{LEFT}}px">{{POCKETS}}</div>
    <div class="fade-l"></div>
    <div class="fade-r"></div>
    <div class="tray"></div>
  </div>
</body>
</html>
