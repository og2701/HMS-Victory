<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<style>
  /* Full-size spinning machine, matching templates/slots.html dimensions so the
     pre-baked spin GIF and the runtime-rendered result frame are the same size (no
     resize when it settles). Only the reels animate (sliding strips); the banner shows
     a generic "SPINNING..." and the HUD shows neutral values, because this image is
     shared by every player - the real player/bet/balance/result are baked into the
     runtime result frame that swaps in once the slide finishes. */
  :root{
    --navy:#00247D; --red:#CF142B; --brass:#b07f2a; --brass-2:#d6a44a; --brass-soft:#e8cf92;
    --serif:Georgia,"Times New Roman",Times,serif; --sans:"Segoe UI",Helvetica,Arial,sans-serif;
    --emoji:"Noto Color Emoji","Apple Color Emoji","Segoe UI Emoji",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#0a0a0f;}
  body{padding:20px;font-family:var(--sans);-webkit-font-smoothing:antialiased;}

  .cabinet{position:relative;width:760px;min-height:960px;border-radius:28px;overflow:hidden;
    background:linear-gradient(180deg, #16356e 0%, var(--navy) 45%, #001a5c 100%);
    box-shadow:0 24px 60px rgba(0,0,0,.6), inset 0 0 120px rgba(0,0,0,.5);color:#fff;
    display:flex;flex-direction:column;align-items:center;}
  .cabinet::before{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:repeating-linear-gradient(45deg, rgba(214,164,74,.05) 0 9px, transparent 9px 18px);}
  .cabinet::after{content:"";position:absolute;inset:14px;border-radius:18px;pointer-events:none;
    border:2px solid rgba(214,164,74,.6);box-shadow:inset 0 0 0 1px rgba(0,0,0,.4), inset 0 0 34px rgba(0,0,0,.4);}

  .masthead{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px 32px 0;text-align:center;}
  .brand{display:flex;align-items:center;gap:14px;}
  .roundel{width:48px;height:48px;border-radius:50%;flex:none;
    background:radial-gradient(circle at center, var(--red) 0 26%, #fff 26% 48%, var(--navy) 48% 70%, #fff 70% 100%);
    box-shadow:0 0 0 2px rgba(214,164,74,.75), 0 3px 8px rgba(0,0,0,.5);}
  .wordmark{display:flex;flex-direction:column;line-height:1;text-align:left;}
  .wordmark .name{font-weight:800;font-size:24px;letter-spacing:.12em;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .wordmark .sub{font-size:12px;font-weight:700;letter-spacing:.34em;text-transform:uppercase;color:var(--brass-soft);margin-top:6px;}
  .title{font-family:var(--serif);font-weight:700;font-size:58px;line-height:1;letter-spacing:.08em;text-transform:uppercase;
    color:var(--brass-2);text-shadow:0 2px 0 rgba(0,0,0,.4), 0 0 24px rgba(214,164,74,.5);}
  .lights{display:flex;gap:14px;margin-top:6px;}
  .lights i{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #fff6cf, var(--brass-2) 60%, #9c6a1f);
    box-shadow:0 0 10px rgba(214,164,74,.8);}

  /* reel window + sliding strips */
  .window{position:relative;z-index:3;display:flex;gap:16px;margin:30px 0 6px;padding:22px;border-radius:18px;
    background:linear-gradient(180deg,#07142e,#0c1a33);
    border:3px solid var(--brass-2);box-shadow:0 0 0 4px rgba(0,0,0,.5), inset 0 0 40px rgba(0,0,0,.7);}
  .reel{width:190px;height:230px;border-radius:14px;overflow:hidden;position:relative;
    background:linear-gradient(180deg,#f7f4ea,#dcd6c4);
    box-shadow:inset 0 0 0 3px rgba(214,164,74,.5), inset 0 8px 20px rgba(0,0,0,.25), inset 0 -8px 20px rgba(0,0,0,.25);}
  .reel .strip{position:absolute;left:0;right:0;top:0;display:flex;flex-direction:column;align-items:center;}
  .reel .strip .sym{height:230px;flex:none;display:flex;align-items:center;justify-content:center;
    font-family:var(--emoji);font-size:118px;line-height:1;}
  .reel::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:2;border-radius:14px;
    background:linear-gradient(180deg, rgba(247,244,234,.85) 0%, rgba(247,244,234,0) 16%, rgba(247,244,234,0) 84%, rgba(220,214,196,.85) 100%);}
  .window.winline{border-color:#ffe9a8;box-shadow:0 0 0 4px rgba(0,0,0,.5), inset 0 0 40px rgba(0,0,0,.7), 0 0 34px rgba(255,233,168,.6);}
  .window.winline .reel{box-shadow:inset 0 0 0 3px #ffd95e, inset 0 8px 20px rgba(0,0,0,.25), inset 0 -8px 20px rgba(0,0,0,.25);}
  .payline{position:absolute;top:50%;left:10px;right:10px;height:3px;transform:translateY(-50%);
    background:linear-gradient(90deg,transparent,rgba(207,20,43,.85),transparent);z-index:3;}

  /* banner (static "SPINNING...") */
  .banner{position:relative;z-index:3;text-align:center;margin:18px 0 8px;padding:16px 48px;border-radius:16px;
    background:linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.5));border:2px solid var(--brass-2);min-width:420px;}
  .banner .head{font-family:var(--serif);font-weight:700;font-size:52px;letter-spacing:.06em;text-transform:uppercase;color:var(--brass-soft);
    text-shadow:2px 2px 4px rgba(0,0,0,.9);}
  .banner .sub{margin-top:8px;font-family:var(--sans);font-weight:700;font-size:24px;letter-spacing:.04em;color:#fff;}

  .hud{position:relative;z-index:3;margin-top:auto;display:flex;gap:16px;padding:18px 36px 34px;width:100%;justify-content:center;}
  .chip{display:flex;align-items:center;gap:13px;background:rgba(0,0,0,.4);border:1px solid rgba(214,164,74,.4);
    border-radius:15px;padding:13px 24px;box-shadow:0 4px 12px rgba(0,0,0,.4);}
  .chip .disc{width:30px;height:30px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%, #ffe9a8, #d6a44a 55%, #9c6a1f 100%);border:2px dashed rgba(255,255,255,.65);box-shadow:0 2px 5px rgba(0,0,0,.5);}
  .chip .meta{display:flex;flex-direction:column;line-height:1.12;}
  .chip .lab{font-size:12px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:rgba(255,255,255,.55);}
  .chip .val{font-family:var(--serif);font-weight:700;font-size:27px;color:#fff;}
  .chip .player{font-family:var(--serif);font-weight:700;font-size:20px;color:#fff;}
  img.emoji{height:1em;width:1em;vertical-align:middle;display:inline-block;}
</style>
</head>
<body>
  <div class="cabinet">
    <div class="masthead">
      <div class="brand">
        <div class="roundel"></div>
        <div class="wordmark"><span class="name">HMS VICTORY</span><span class="sub">Casino Royale</span></div>
      </div>
      <div class="title">Fruit Machine</div>
      <div class="lights"><i></i><i></i><i></i><i></i><i></i></div>
    </div>

    <div class="window{{WINLINE}}">
      <div class="payline"></div>
      {{REELS}}
    </div>

    <div class="banner"><div class="head">Spinning...</div><div class="sub">Good luck!</div></div>

    <div class="hud">
      <div class="chip"><span class="meta"><span class="lab">Player</span><span class="player">-</span></span></div>
      <div class="chip"><span class="disc"></span><span class="meta"><span class="lab">Bet</span><span class="val">-</span></span></div>
      <div class="chip"><span class="disc"></span><span class="meta"><span class="lab">Balance</span><span class="val">-</span></span></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <script>window.onload=function(){twemoji.parse(document.body,{folder:'svg',ext:'.svg'});};</script>
</body>
</html>
