<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;800&display=swap');

    body {
      margin: 0;
      padding: 20px;
      background: #00247D;
      /* British Racing Blue / Union Jack Blue */
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.85);
      border: 4px solid #CF142B;
      /* Union Jack Red */
      border-radius: 12px;
      padding: 24px;
      width: 850px;
      /* Controlled width to prevent cropping */
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .header {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 24px;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 2px solid #FFFFFF;
      padding-bottom: 10px;
    }

    .leaderboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    .rank-badge {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      width: 35px;
      color: #CF142B;
    }

    .rank-1 .rank-badge {
      color: #FFD700;
      font-size: 1.4rem;
    }

    .rank-2 .rank-badge {
      color: #C0C0C0;
      font-size: 1.2rem;
    }

    .rank-3 .rank-badge {
      color: #CD7F32;
      font-size: 1.1rem;
    }

    .avatar-container {
      position: relative;
      width: 48px;
      height: 48px;
      margin-right: 12px;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #FFFFFF;
    }

    .user-info {
      flex-grow: 1;
      min-width: 0;
    }

    .user-name {
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-stats {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .stat-highlight {
      color: #FFFFFF;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">HMS Victory Leaderboard</div>
    <div class="leaderboard-grid">
      {{ LEADERBOARD_ROWS }}
    </div>
  </div>
</body>

</html>
