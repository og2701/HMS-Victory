<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HMS Victory — Prediction Card</title>
<style>
  /* ============================================================
     HMS VICTORY — Prediction / betting card (LANDSCAPE)
     1000px wide, short height so Discord shows it big inline
     (no tap-to-open). All CSS inline. No JS. No external assets.
     System fonts only. No emoji.
     Tokens (each appears once below; do NOT also list them here as
     literal {{...}} or the bot would substitute into this comment):
     TITLE, STATUS, CLOSES, POOL_TOTAL, BETTOR_COUNT, OPTION_COUNT, OPTIONS
     The bot injects per-outcome .pred-option rows into the .options grid.
     ============================================================ */

  :root{
    --navy:#00247D;
    --red:#CF142B;
    --ink:#111a33;
    --paper:#ffffff;
    --paper-line:#e3dfd2;
    --card:#ffffff;
    --muted:#5d6577;
    --muted-soft:#8a92a3;
    --track:#ece6d7;
    --serif:Georgia,"Times New Roman",Times,serif;
    --sans:"Segoe UI",Helvetica,Arial,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);}
  body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;}

  .sheet{width:1000px;background:var(--paper);margin:0;}

  /* ---------- Masthead (compact, one row) ---------- */
  .masthead{
    background:var(--navy);
    background-image:
      linear-gradient(135deg, rgba(255,255,255,.05) 0 2px, transparent 2px 9px),
      linear-gradient(45deg,  rgba(255,255,255,.05) 0 2px, transparent 2px 9px);
    background-size:18px 18px;
    padding:18px 36px;
    display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .brand{display:flex;align-items:center;gap:15px;}
  .roundel{
    width:42px;height:42px;border-radius:50%;flex:none;
    background:radial-gradient(circle at center,
      var(--red) 0 28%, #fff 28% 50%, var(--navy) 50% 72%, #fff 72% 100%);
    box-shadow:0 0 0 2px rgba(255,255,255,.55), 0 2px 6px rgba(0,0,0,.3);
  }
  .wordmark{display:flex;flex-direction:column;line-height:1;}
  .wordmark .name{color:#fff;font-weight:800;font-size:26px;letter-spacing:.06em;}
  .wordmark .sub{color:#aeb7d6;font-size:12px;font-weight:600;letter-spacing:.28em;
    text-transform:uppercase;margin-top:7px;}
  .head-right{display:flex;flex-direction:column;align-items:flex-end;gap:9px;}
  .status-pill{
    display:inline-flex;align-items:center;gap:9px;padding:9px 18px;border-radius:999px;
    font-size:15px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;line-height:1;
  }
  .status-ico{display:inline-block;position:relative;}
  .status-pill[data-status="Open"]{background:#fff;color:var(--navy);}
  .status-pill[data-status="Open"] .status-ico{
    width:10px;height:10px;border-radius:50%;background:#1faa53;
    box-shadow:0 0 0 3px rgba(31,170,83,.25);}
  .status-pill[data-status="Locked"]{
    background:rgba(255,255,255,.12);color:#c2c9da;box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);}
  .status-pill[data-status="Locked"] .status-ico{width:14px;height:17px;}
  .status-pill[data-status="Locked"] .status-ico::before{
    content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:9px;height:8px;border:2px solid currentColor;border-bottom:none;border-radius:5px 5px 0 0;}
  .status-pill[data-status="Locked"] .status-ico::after{
    content:"";position:absolute;left:0;bottom:0;width:14px;height:11px;background:currentColor;border-radius:2px;}
  .closes{color:#c4cce4;font-size:15px;font-weight:600;}

  .tricolour{height:5px;display:flex;}
  .tricolour i{flex:1;}
  .tricolour i:nth-child(1){background:var(--red);}
  .tricolour i:nth-child(2){background:#fff;}
  .tricolour i:nth-child(3){background:var(--navy);}

  /* ---------- Body ---------- */
  .body{padding:26px 36px 30px;}

  /* Title + stats share one band to keep the card short/landscape */
  .headband{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;margin-bottom:22px;}
  .q{flex:1;min-width:0;}
  .kicker{font-size:12px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--red);margin:0 0 9px;}
  .title{font-family:var(--serif);font-weight:700;font-size:40px;line-height:1.12;color:var(--navy);
    margin:0;letter-spacing:-.01em;text-wrap:pretty;}

  .stats{display:flex;flex:none;border:1px solid var(--paper-line);border-radius:12px;overflow:hidden;background:var(--card);}
  .stat{padding:12px 20px;display:flex;flex-direction:column;gap:5px;text-align:center;align-items:center;}
  .stat + .stat{border-left:1px solid var(--paper-line);}
  .stat .num{font-size:28px;font-weight:800;color:var(--navy);line-height:1;
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;white-space:nowrap;}
  .stat.pool .num{color:var(--red);}
  .stat .num .unit{font-size:13px;font-weight:700;color:var(--muted);margin-left:5px;letter-spacing:.04em;}
  .stat .lbl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-soft);}

  /* ---------- Options grid (bot-injected rows, laid out side-by-side) ---------- */
  .options{display:grid;gap:16px;}
  .options[data-count="2"]{grid-template-columns:repeat(2,1fr);}
  .options[data-count="3"]{grid-template-columns:repeat(3,1fr);}
  .options[data-count="4"]{grid-template-columns:repeat(2,1fr);}
  .options[data-count="5"]{grid-template-columns:repeat(3,1fr);}

  .pred-option{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-top:5px solid var(--accent);
    border-radius:13px;
    padding:17px 19px 18px;
    display:flex;flex-direction:column;gap:13px;
    box-shadow:0 1px 3px rgba(16,26,51,.06);
  }
  .pred-option-top{display:flex;align-items:center;gap:12px;}
  .pred-option-rank{
    flex:none;width:34px;height:34px;border-radius:9px;
    border:2px solid var(--accent);color:var(--accent);
    display:grid;place-items:center;font-size:17px;font-weight:800;line-height:1;
    font-variant-numeric:tabular-nums;}
  .pred-option-name{flex:1;min-width:0;font-size:27px;font-weight:800;color:var(--navy);
    letter-spacing:-.01em;line-height:1.1;overflow-wrap:anywhere;}
  .pred-option-odds{
    flex:none;font-size:22px;font-weight:800;line-height:1;
    color:color-mix(in srgb, var(--accent) 78%, #07142e);
    background:color-mix(in srgb, var(--accent) 13%, #ffffff);
    border:1px solid color-mix(in srgb, var(--accent) 30%, #ffffff);
    padding:8px 14px;border-radius:9px;
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}

  .pred-bar{height:16px;border-radius:8px;background:var(--track);overflow:hidden;}
  .pred-bar-fill{height:100%;border-radius:8px;min-width:6px;
    background:linear-gradient(180deg,
      color-mix(in srgb, var(--accent) 88%, #ffffff) 0%,
      var(--accent) 55%,
      color-mix(in srgb, var(--accent) 86%, #000000) 100%);}

  .pred-option-bottom{display:flex;flex-wrap:wrap;align-items:baseline;gap:7px 14px;}
  .pred-option-total{font-size:25px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;}
  .pred-option-pct{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;
    color:color-mix(in srgb, var(--accent) 74%, #07142e);}
  .pred-option-bettors{flex-basis:100%;font-size:14px;font-weight:600;color:var(--muted);}
  .pred-option-top-bettor{flex-basis:100%;display:flex;align-items:baseline;gap:8px;
    font-size:16px;font-weight:700;color:var(--navy);letter-spacing:.01em;}
  .pred-option-top-bettor::before{
    content:"TOP BACKER";font-size:10px;font-weight:800;letter-spacing:.16em;color:#aab1c0;}
</style>
</head>
<body>
  <div class="sheet">

    <div class="masthead">
      <div class="brand">
        <div class="roundel"></div>
        <div class="wordmark">
          <span class="name">HMS VICTORY</span>
          <span class="sub">Prediction Market</span>
        </div>
      </div>
      <div class="head-right">
        <span class="status-pill" data-status="{{STATUS}}">
          <span class="status-ico"></span>{{STATUS}}
        </span>
        <span class="closes">{{CLOSES}}</span>
      </div>
    </div>

    <div class="tricolour"><i></i><i></i><i></i></div>

    <div class="body">
      <div class="headband">
        <div class="q">
          <p class="kicker">The Question</p>
          <h1 class="title">{{TITLE}}</h1>
        </div>
        <div class="stats">
          <div class="stat pool">
            <span class="num">{{POOL_TOTAL}}<span class="unit">UKP</span></span>
            <span class="lbl">Pool</span>
          </div>
          <div class="stat">
            <span class="num">{{BETTOR_COUNT}}</span>
            <span class="lbl">Bettors</span>
          </div>
          <div class="stat">
            <span class="num">{{OPTION_COUNT}}</span>
            <span class="lbl">Outcomes</span>
          </div>
        </div>
      </div>

      <div class="options" data-count="{{OPTION_COUNT}}">{{OPTIONS}}</div>
    </div>

  </div>
</body>
</html>
