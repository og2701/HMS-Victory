<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UKPence Economy Stats</title>
    <style>
        body {{
            margin: 0;
            padding: 25px;
            background-color: #2c2f33;
            font-family: "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla", Arial, sans-serif;
            color: #dcddde;
            width: 750px;
            box-sizing: border-box;
        }}
        .container {{
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 20px;
            background-color: #23272a;
        }}
        .header {{
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 20px;
            text-align: center;
        }}
        .section {{
            margin-bottom: 15px;
        }}
        .section-title {{
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
            margin-top: 15px;
            margin-bottom: 12px;
            border-bottom: 1px solid #444;
            padding-bottom: 6px;
        }}
        .stat-grid {{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 10px;
        }}
        .stat-item {{
            background-color: #2c2f33;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #383c40;
            text-align: center;
        }}
        .stat-item .label {{
            font-size: 14px;
            color: #99aab5;
            margin-bottom: 5px;
        }}
        .stat-item strong {{
            color: #88dd88;
            font-size: 18px;
            display: block;
        }}
        .stat-item .sub-value {{
            font-size: 13px;
            color: #b0b0b0;
            margin-top: 3px;
        }}
        .user-list li {{
            background-color: #2f3136;
            margin-bottom: 6px;
            padding: 10px;
            border-radius: 5px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }}
        .user-details-left {{
            display: flex;
            align-items: center;
            min-width: 0;
            flex-shrink: 1;
            overflow: hidden;
        }}
        .user-list .rank {{
            font-weight: bold;
            color: #4CAF50;
            margin-right: 8px;
        }}

            width: 32px;
            height: 32px;
